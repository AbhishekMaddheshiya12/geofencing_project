services:
  backend:
    build:
      context: ./backend
    environment:
      HTTP_ADDR: ${HTTP_ADDR}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    ports:
      - "5173:80"
    depends_on:
      - backend

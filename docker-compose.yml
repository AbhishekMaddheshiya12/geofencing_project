services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: geofence
      POSTGRES_PASSWORD: geofence
      POSTGRES_DB: geofence
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geofence -d geofence"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgis_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://geofence:geofence@postgis:5432/geofence?sslmode=disable"
      CORS_ALLOWED_ORIGIN: "*"
    ports:
      - "8080:8080"
    depends_on:
      postgis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://localhost:8080"
        VITE_WS_URL: "ws://localhost:8080/ws/alerts"
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgis_data:
